services:
  postgres:
    image: postgres:17
    container_name: model-gateway-postgres
    ports:
      - "5432:5432"
    volumes:
      - model-gateway-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: model-gateway-1
      POSTGRES_DB: model-gateway-1
    cpus: 2.0
    mem_limit: 2G
    memswap_limit: 2G
    restart: no
    logging:
      driver: none

  clickhouse:
    image: clickhouse:lts
    container_name: model-gateway-clickhouse
    ports:
      - "8123:8123"
    volumes:
      - model-gateway-clickhouse-data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: model-gateway-1
      CLICKHOUSE_DB: modelgateway1
    cpus: 2.0
    mem_limit: 2G
    memswap_limit: 2G
    restart: no
    logging:
      driver: none

  redis:
    image: redis:7
    container_name: model-gateway-redis
    ports:
      - "6379:6379"
    cpus: 1.0
    mem_limit: 1G
    memswap_limit: 1G
    restart: no
    logging:
      driver: none

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: model-gateway-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - model-gateway-minio-data:/data
    environment:
      MINIO_ROOT_USER: user1
      MINIO_ROOT_PASSWORD: 11111111
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    command: server /data --console-address ":9001"
    cpus: 1.0
    mem_limit: 1G
    memswap_limit: 1G
    restart: no
    logging:
      driver: none
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-setup:
    image: minio/mc:latest
    container_name: model-gateway-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set mm http://minio:9000 user1 11111111;
      mc mb mm/bucket1;
      mc admin user svcacct add mm user1 --access-key accesskey1 --secret-key secretkey1;
      exit 0;
      "
    restart: no

volumes:
  model-gateway-postgres-data:
  model-gateway-clickhouse-data:
  model-gateway-minio-data: